name: Pipeline CI/CD MedHead

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./emergency-responder

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Donner les droits d'exécution au Maven Wrapper
        run: chmod +x mvnw

      - name: Compiler et tester le Back-end
        run: ./mvnw clean verify

      - name: Publier les rapports de tests Back-end
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-reports
          path: emergency-responder/target/surefire-reports/
          if-no-files-found: ignore

  build-and-test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./medhead-front

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances NPM
        run: npm install

      - name: Builder le Front-end
        run: npm run build

      - name: Lancer le serveur de dev et exécuter Cypress
        run: npx start-server-and-test 'npm run dev' http://localhost:5173 'npx cypress run'

      - name: Publier les artefacts Cypress
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-artifacts
          path: |
            medhead-front/cypress/screenshots
            medhead-front/cypress/videos
          if-no-files-found: ignore